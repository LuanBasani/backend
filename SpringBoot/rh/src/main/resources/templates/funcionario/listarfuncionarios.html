<!DOCTYPE html>
<html lang="pt-br" xmlns="https://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listar Funcionarios</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container">
        <!-- navbar -->
        <div th:insert="~{fragmentos/header :: header}"></div>


        <h4>Listar Funcionarios</h4>
        <table class="table table-hover">
            <thead>
                <tr>
                    <th scope="col">Nome:</th>
                    <th scope="col">E-mail:</th>
                </tr>
            </thead>
            <tbody>
                <!-- listar o funcionario da lista de funcionários  -->
                <tr th:each="funcionario : ${funcionarios}">
                    <td><span th:text="${funcionario.nome}"></span></td>
                    <td><span th:text="${funcionario.email}"></span></td>
                    <td><a th:href="@{'/deletarfuncionario/' + ${funcionario.id}}" class="waves-effect">
                        <button type="button" class="btn btn-danger btn-sm">Deletar</button>
                    </a></td>
                    <td><a th:href="@{'/editarfuncionario/' +${funcionario.id}}">
                        <button type="button" class="btn btn-primary btn-sm">Editar</button>
                    </a></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
